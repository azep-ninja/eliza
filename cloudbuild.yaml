steps:
# Set agent name based on character file and suffix
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Starting build process..."
    echo "CHARACTER_FILE is: $_CHARACTER_FILE"
    echo "SUFFIX is: $_SUFFIX"
    # Extract base name from CHARACTER_FILE
    agent_name=$(echo $_CHARACTER_FILE | sed 's/\.character\.json//' | sed 's/_/-/g')
    # Add suffix if provided
    if [ ! -z "$_SUFFIX" ]; then
      full_name="${agent_name}-${_SUFFIX}"
    else
      full_name="${agent_name}"
    fi
    echo "${agent_name}" > /workspace/agent_name
    echo "${full_name}" > /workspace/full_name
    # Add timestamp for versioning
    timestamp=$(date +%Y%m%d-%H%M%S)
    echo "${timestamp}" > /workspace/version
    echo "Agent name will be: ${full_name}"
    echo "Version will be: ${timestamp}"
    ls -la
    pwd

# Verify secrets and bucket access
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Verifying secrets access..."
    echo "Testing secrets..."
    if ! gcloud secrets versions access latest --secret="small-google-model" > /dev/null; then
      echo "Failed to access small-google-model secret"
      exit 1
    fi
    if ! gcloud secrets versions access latest --secret="agents-bucket-name" > /dev/null; then
      echo "Failed to access agents-bucket-name secret"
      exit 1
    fi
    echo "Verifying bucket access..."
    bucket_name=$(gcloud secrets versions access latest --secret="agents-bucket-name")
    if ! gsutil ls gs://${bucket_name} > /dev/null; then
      echo "Failed to access bucket"
      exit 1
    fi
    echo "Secret and bucket access verified"
    echo "BUCKET_NAME=${bucket_name}" > /workspace/env_vars

# Build the container image
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Starting Docker build..."
    full_name=$(cat /workspace/full_name)
    version=$(cat /workspace/version)
    echo "Building for: ${full_name}"
    ls -la
    docker build -t us-central1-docker.pkg.dev/$PROJECT_ID/qi-agents/${full_name}:${version} . || { echo "Docker build failed"; exit 1; }
    echo "Docker build completed"

# Push the container image
- name: 'gcr.io/cloud-builders/docker'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Starting Docker push..."
    full_name=$(cat /workspace/full_name)
    version=$(cat /workspace/version)
    echo "Pushing image: us-central1-docker.pkg.dev/$PROJECT_ID/qi-agents/${full_name}:${version}"
    docker push us-central1-docker.pkg.dev/$PROJECT_ID/qi-agents/${full_name}:${version} || { echo "Docker push failed"; exit 1; }
    echo "Docker push completed"

# Create or update instance
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    echo "Starting instance creation/update..."
    full_name=$(cat /workspace/full_name)
    version=$(cat /workspace/version)
    bucket_name=$(gcloud secrets versions access latest --secret="agents-bucket-name")
    echo "Working with instance: ${full_name}"
    echo "Checking for existing instance..."
    if [[ $(gcloud compute instances list --filter="name=${full_name}" --format="get(name)") ]]; then
      echo "Updating existing instance ${full_name}"
      gcloud compute instances update-container ${full_name} \
        --container-image us-central1-docker.pkg.dev/$PROJECT_ID/qi-agents/${full_name}:${version} \
        --container-env AGENTS_BUCKET_NAME=${bucket_name},CHARACTER_FILE=${_CHARACTER_FILE} \
        --zone $_ZONE || { echo "Instance update failed"; exit 1; }
      echo "Instance update completed"
    else
      echo "Creating new instance ${full_name}"
      gcloud compute instances create-with-container ${full_name} \
        --container-image us-central1-docker.pkg.dev/$PROJECT_ID/qi-agents/${full_name}:${version} \
        --machine-type $_MACHINE_TYPE \
        --zone $_ZONE \
        --network $_NETWORK \
        --subnet $_SUBNET \
        --no-address \
        --boot-disk-size $_DISK_SIZE \
        --container-env AGENTS_BUCKET_NAME=${bucket_name},CHARACTER_FILE=${_CHARACTER_FILE} \
        --metadata-from-file startup-script=startup.sh || { echo "Instance creation failed"; exit 1; }
      echo "Instance creation completed"
    fi

substitutions:
  _ZONE: us-central1-a
  _MACHINE_TYPE: e2-small
  _DISK_SIZE: 30GB
  _NETWORK: agents-vpc
  _SUBNET: agents-subnet
  _CHARACTER_FILE: default.character.json
  _SUFFIX: agent

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'